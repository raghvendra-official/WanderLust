name: WanderLust CI/CD

# on:
#   push:
#     branches:
#       - main
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Build Docker Image
        run: docker build -t wanderlust .

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Image
        run: |
          docker tag wanderlust \
          ${{ secrets.DOCKER_USERNAME }}/wanderlust:latest

      - name: Push Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/wanderlust:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/wanderlust:latest

            docker stop wanderlust || true

            docker rm wanderlust || true

            docker run -d \
              --name wanderlust \
              --restart always \
              --env-file /opt/wanderlust/.env \
              -p 80:8080 \
              ${{ secrets.DOCKER_USERNAME }}/wanderlust:latest