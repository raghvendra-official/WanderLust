name: WanderLust CI/CD

on:

  push:

    branches:

      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

        with:

          node-version: 22

      - run: npm install

      - run: npm test || true

      - run: docker build -t wanderlust .

      - uses: docker/login-action@v3

        with:

          username: ${{ secrets.DOCKER_USERNAME }}

          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: |

          docker tag wanderlust \
          ${{ secrets.DOCKER_USERNAME }}/wanderlust:latest

      - run: |

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/wanderlust:latest